<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="sysGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="pxnGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0f3460;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a5e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="podGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#533483;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3a1078;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="coreGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c62a4f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="memGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a8967;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06694e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="dramGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e07c24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c56a15;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="900" fill="#0d1117" rx="12"/>

  <!-- Title -->
  <text x="600" y="45" text-anchor="middle" fill="#e6edf3" font-size="26" font-weight="bold">PANDOHammer System Hierarchy</text>
  <text x="600" y="70" text-anchor="middle" fill="#8b949e" font-size="14">System &gt; PXN &gt; POD &gt; Core &gt; Hart</text>

  <!-- System Level Box -->
  <rect x="30" y="85" width="1140" height="790" rx="16" fill="url(#sysGrad)" stroke="#30363d" stroke-width="2" filter="url(#shadow)"/>
  <text x="55" y="115" fill="#58a6ff" font-size="18" font-weight="bold">SYSTEM</text>
  <text x="170" y="115" fill="#8b949e" font-size="13">Inter-PXN Network (merlin.hr_router, ~1 GB/s)</text>

  <!-- System Router -->
  <rect x="510" y="130" width="180" height="36" rx="8" fill="#21262d" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="600" y="153" text-anchor="middle" fill="#58a6ff" font-size="13" font-weight="bold">System Router</text>

  <!-- PXN 0 -->
  <rect x="50" y="195" width="540" height="660" rx="12" fill="url(#pxnGrad)" stroke="#1f6feb" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="72" y="222" fill="#79c0ff" font-size="16" font-weight="bold">PXN 0</text>
  <text x="165" y="222" fill="#8b949e" font-size="11">Processing eXecution Node</text>

  <!-- PXN 0 Router -->
  <rect x="200" y="235" width="160" height="30" rx="6" fill="#21262d" stroke="#1f6feb" stroke-width="1"/>
  <text x="280" y="255" text-anchor="middle" fill="#79c0ff" font-size="11" font-weight="bold">PXN Router</text>

  <!-- Line from system router to PXN 0 router -->
  <line x1="550" y1="166" x2="360" y2="235" stroke="#58a6ff" stroke-width="1.5" stroke-dasharray="6,3"/>

  <!-- POD 0 inside PXN 0 -->
  <rect x="68" y="280" width="505" height="340" rx="10" fill="url(#podGrad)" stroke="#8b5cf6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="88" y="304" fill="#c4b5fd" font-size="14" font-weight="bold">POD 0</text>
  <text x="160" y="304" fill="#8b949e" font-size="10">Processing Cluster</text>

  <!-- POD Router -->
  <rect x="210" y="312" width="140" height="26" rx="5" fill="#21262d" stroke="#8b5cf6" stroke-width="1"/>
  <text x="280" y="330" text-anchor="middle" fill="#c4b5fd" font-size="10" font-weight="bold">POD Router</text>

  <!-- Line from PXN router to POD router -->
  <line x1="280" y1="265" x2="280" y2="312" stroke="#1f6feb" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Core 0 -->
  <rect x="85" y="350" width="145" height="185" rx="8" fill="url(#coreGrad)" stroke="#f97583" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="95" y="372" fill="#fff" font-size="12" font-weight="bold">Core 0</text>

  <!-- Harts inside Core 0 -->
  <rect x="95" y="382" width="56" height="22" rx="4" fill="#21262d" stroke="#f97583" stroke-width="0.8"/>
  <text x="123" y="397" text-anchor="middle" fill="#ffa198" font-size="9">Hart 0</text>
  <rect x="95" y="408" width="56" height="22" rx="4" fill="#21262d" stroke="#f97583" stroke-width="0.8"/>
  <text x="123" y="423" text-anchor="middle" fill="#ffa198" font-size="9">Hart 1</text>
  <rect x="95" y="434" width="56" height="22" rx="4" fill="#21262d" stroke="#f97583" stroke-width="0.8"/>
  <text x="123" y="449" text-anchor="middle" fill="#ffa198" font-size="9">Hart 2</text>
  <rect x="95" y="460" width="56" height="22" rx="4" fill="#161b22" stroke="#484f58" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="123" y="475" text-anchor="middle" fill="#8b949e" font-size="9">...</text>
  <rect x="95" y="486" width="56" height="22" rx="4" fill="#21262d" stroke="#f97583" stroke-width="0.8"/>
  <text x="123" y="501" text-anchor="middle" fill="#ffa198" font-size="9">Hart 15</text>

  <!-- Hart detail annotations -->
  <rect x="158" y="382" width="65" height="126" rx="4" fill="#161b22" stroke="#484f58" stroke-width="0.8"/>
  <text x="165" y="397" fill="#8b949e" font-size="8">x[0..31]</text>
  <text x="165" y="410" fill="#8b949e" font-size="8">f[0..31]</text>
  <text x="165" y="423" fill="#8b949e" font-size="8">PC</text>
  <text x="165" y="436" fill="#8b949e" font-size="8">SP range</text>
  <text x="165" y="449" fill="#8b949e" font-size="8">stalled?</text>
  <text x="165" y="462" fill="#8b949e" font-size="8">sleeping?</text>
  <text x="165" y="475" fill="#8b949e" font-size="8">stat_phase</text>
  <text x="165" y="500" fill="#ffa198" font-size="8" font-weight="bold">RV64IMAF</text>

  <!-- L1SP for Core 0 -->
  <rect x="93" y="515" width="130" height="28" rx="5" fill="url(#memGrad)" stroke="#3fb950" stroke-width="1"/>
  <text x="158" y="534" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold">L1SP 256KB</text>

  <!-- Core 0 Tile Router -->
  <line x1="157" y1="350" x2="280" y2="338" stroke="#8b5cf6" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Core 1 -->
  <rect x="250" y="350" width="145" height="185" rx="8" fill="url(#coreGrad)" stroke="#f97583" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="260" y="372" fill="#fff" font-size="12" font-weight="bold">Core 1</text>

  <!-- Harts inside Core 1 (simplified) -->
  <rect x="260" y="382" width="56" height="22" rx="4" fill="#21262d" stroke="#f97583" stroke-width="0.8"/>
  <text x="288" y="397" text-anchor="middle" fill="#ffa198" font-size="9">Hart 0</text>
  <rect x="260" y="408" width="56" height="22" rx="4" fill="#21262d" stroke="#f97583" stroke-width="0.8"/>
  <text x="288" y="423" text-anchor="middle" fill="#ffa198" font-size="9">Hart 1</text>
  <rect x="260" y="434" width="56" height="22" rx="4" fill="#161b22" stroke="#484f58" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="288" y="449" text-anchor="middle" fill="#8b949e" font-size="9">...</text>
  <rect x="260" y="460" width="56" height="22" rx="4" fill="#21262d" stroke="#f97583" stroke-width="0.8"/>
  <text x="288" y="475" text-anchor="middle" fill="#ffa198" font-size="9">Hart 15</text>

  <!-- Hart detail for core 1 -->
  <rect x="323" y="382" width="65" height="100" rx="4" fill="#161b22" stroke="#484f58" stroke-width="0.8"/>
  <text x="330" y="397" fill="#8b949e" font-size="8">x[0..31]</text>
  <text x="330" y="410" fill="#8b949e" font-size="8">f[0..31]</text>
  <text x="330" y="423" fill="#8b949e" font-size="8">PC</text>
  <text x="330" y="436" fill="#8b949e" font-size="8">SP range</text>
  <text x="330" y="449" fill="#8b949e" font-size="8">stalled?</text>
  <text x="330" y="462" fill="#8b949e" font-size="8">sleeping?</text>
  <text x="330" y="475" fill="#8b949e" font-size="8">stat_phase</text>

  <!-- L1SP for Core 1 -->
  <rect x="258" y="515" width="130" height="28" rx="5" fill="url(#memGrad)" stroke="#3fb950" stroke-width="1"/>
  <text x="323" y="534" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold">L1SP 256KB</text>

  <!-- Core 1 Tile Router -->
  <line x1="322" y1="350" x2="280" y2="338" stroke="#8b5cf6" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- More cores indicator -->
  <rect x="415" y="395" width="70" height="80" rx="8" fill="#161b22" stroke="#484f58" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="450" y="430" text-anchor="middle" fill="#8b949e" font-size="11">Core</text>
  <text x="450" y="445" text-anchor="middle" fill="#8b949e" font-size="11">2..N</text>
  <rect x="420" y="485" width="60" height="20" rx="4" fill="#161b22" stroke="#3fb950" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="450" y="499" text-anchor="middle" fill="#8b949e" font-size="8">L1SP</text>

  <!-- L2SP shared -->
  <rect x="85" y="556" width="480" height="50" rx="8" fill="url(#memGrad)" stroke="#3fb950" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="325" y="578" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">L2SP (Shared Pod Scratchpad) - 1MB default</text>
  <text x="325" y="596" text-anchor="middle" fill="#d2f4d3" font-size="10">Banked, interleaved, explicit placement via __l2sp__</text>

  <!-- L2SP to POD router line -->
  <line x1="325" y1="556" x2="280" y2="338" stroke="#3fb950" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- POD 1 placeholder inside PXN 0 -->
  <rect x="68" y="630" width="505" height="50" rx="10" fill="#161b22" stroke="#8b5cf6" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="320" y="660" text-anchor="middle" fill="#8b949e" font-size="13">POD 1 .. POD P-1 (same structure)</text>

  <!-- DRAM for PXN 0 -->
  <rect x="68" y="700" width="505" height="55" rx="8" fill="url(#dramGrad)" stroke="#f0883e" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="320" y="724" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">DRAM - 2GB default per PXN</text>
  <text x="320" y="744" text-anchor="middle" fill="#ffddb0" font-size="10">Ramulator HBM backend | Banked | Optional MESI cache | Interleaved slices</text>

  <!-- Line from PXN router to DRAM -->
  <line x1="280" y1="265" x2="280" y2="700" stroke="#f0883e" stroke-width="1" stroke-dasharray="6,3" opacity="0.5"/>

  <!-- PXN 1 -->
  <rect x="620" y="195" width="540" height="660" rx="12" fill="url(#pxnGrad)" stroke="#1f6feb" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="642" y="222" fill="#79c0ff" font-size="16" font-weight="bold">PXN 1</text>
  <text x="735" y="222" fill="#8b949e" font-size="11">Processing eXecution Node</text>

  <!-- Line from system router to PXN 1 -->
  <line x1="650" y1="166" x2="850" y2="235" stroke="#58a6ff" stroke-width="1.5" stroke-dasharray="6,3"/>

  <!-- PXN 1 Router -->
  <rect x="770" y="235" width="160" height="30" rx="6" fill="#21262d" stroke="#1f6feb" stroke-width="1"/>
  <text x="850" y="255" text-anchor="middle" fill="#79c0ff" font-size="11" font-weight="bold">PXN Router</text>

  <!-- Simplified PXN 1 contents -->
  <rect x="638" y="280" width="505" height="340" rx="10" fill="url(#podGrad)" stroke="#8b5cf6" stroke-width="1" opacity="0.7"/>
  <text x="890" y="450" text-anchor="middle" fill="#c4b5fd" font-size="16" font-weight="bold">PODs + Cores + Harts</text>
  <text x="890" y="475" text-anchor="middle" fill="#8b949e" font-size="12">(Same hierarchical structure)</text>
  <text x="890" y="500" text-anchor="middle" fill="#8b949e" font-size="11">Connected via PGAS for</text>
  <text x="890" y="518" text-anchor="middle" fill="#8b949e" font-size="11">cross-PXN memory access</text>

  <!-- L2SP placeholder PXN 1 -->
  <rect x="650" y="556" width="480" height="50" rx="8" fill="url(#memGrad)" stroke="#3fb950" stroke-width="1" opacity="0.7"/>
  <text x="890" y="586" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">L2SP (Shared Pod Scratchpad)</text>

  <!-- DRAM for PXN 1 -->
  <rect x="638" y="700" width="505" height="55" rx="8" fill="url(#dramGrad)" stroke="#f0883e" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="890" y="724" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">DRAM - 2GB default per PXN</text>
  <text x="890" y="744" text-anchor="middle" fill="#ffddb0" font-size="10">Ramulator HBM backend | Banked | Optional MESI cache</text>

  <!-- PGAS arrow between PXNs -->
  <line x1="590" y1="450" x2="638" y2="450" stroke="#f0883e" stroke-width="2.5"/>
  <polygon points="635,445 645,450 635,455" fill="#f0883e"/>
  <line x1="620" y1="450" x2="590" y2="450" stroke="#f0883e" stroke-width="2.5"/>
  <polygon points="593,445 583,450 593,455" fill="#f0883e"/>
  <text x="614" y="440" text-anchor="middle" fill="#f0883e" font-size="9" font-weight="bold">PGAS</text>

  <!-- Legend -->
  <rect x="640" y="775" width="500" height="80" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="660" y="798" fill="#e6edf3" font-size="12" font-weight="bold">Legend:</text>
  <rect x="660" y="808" width="14" height="14" rx="2" fill="url(#coreGrad)"/>
  <text x="680" y="820" fill="#8b949e" font-size="10">Core (16 harts, RV64IMAF)</text>
  <rect x="800" y="808" width="14" height="14" rx="2" fill="url(#memGrad)"/>
  <text x="820" y="820" fill="#8b949e" font-size="10">Scratchpad (L1SP/L2SP)</text>
  <rect x="960" y="808" width="14" height="14" rx="2" fill="url(#dramGrad)"/>
  <text x="980" y="820" fill="#8b949e" font-size="10">DRAM (HBM)</text>
  <text x="660" y="845" fill="#8b949e" font-size="10">Default config: 16 harts/core, 256KB L1SP, 1MB L2SP, 2GB DRAM, 1GHz clock</text>
</svg>
