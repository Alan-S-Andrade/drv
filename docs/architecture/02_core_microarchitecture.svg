<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 850" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#c62a4f"/>
    </linearGradient>
    <linearGradient id="hartGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2d333b"/>
      <stop offset="100%" style="stop-color:#22272e"/>
    </linearGradient>
    <linearGradient id="activeHart" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a7f37"/>
      <stop offset="100%" style="stop-color:#116329"/>
    </linearGradient>
    <linearGradient id="stalledHart" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9e6a03"/>
      <stop offset="100%" style="stop-color:#845306"/>
    </linearGradient>
    <linearGradient id="sleepHart" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6e40aa"/>
      <stop offset="100%" style="stop-color:#5a32a3"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowG" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3fb950"/>
    </marker>
    <marker id="arrowB" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#58a6ff"/>
    </marker>
    <marker id="arrowR" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#f97583"/>
    </marker>
    <marker id="arrowW" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#e6edf3"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="850" fill="#0d1117" rx="12"/>

  <!-- Title -->
  <text x="550" y="40" text-anchor="middle" fill="#e6edf3" font-size="24" font-weight="bold">RISCVCore Microarchitecture</text>
  <text x="550" y="62" text-anchor="middle" fill="#8b949e" font-size="13">Single-stage, unpipelined, in-order interpreter with hardware multithreading</text>

  <!-- Core Box -->
  <rect x="30" y="80" width="1040" height="740" rx="14" fill="#161b22" stroke="#e94560" stroke-width="2"/>
  <rect x="30" y="80" width="1040" height="40" rx="14" fill="url(#headerGrad)"/>
  <rect x="30" y="106" width="1040" height="14" fill="url(#headerGrad)"/>
  <text x="550" y="106" text-anchor="middle" fill="#fff" font-size="16" font-weight="bold">RISCVCore (Drv.RISCVCore) - Single Core</text>

  <!-- ========== HART FILE (left side) ========== -->
  <text x="60" y="150" fill="#e6edf3" font-size="15" font-weight="bold">Hart Pool (16 harts default)</text>
  <text x="60" y="168" fill="#8b949e" font-size="11">Round-robin scheduling: selectNextHart()</text>

  <!-- Hart 0 - Active -->
  <rect x="50" y="180" width="260" height="95" rx="8" fill="url(#activeHart)" stroke="#3fb950" stroke-width="1.5"/>
  <circle cx="68" cy="198" r="6" fill="#3fb950" filter="url(#glow)"/>
  <text x="80" y="203" fill="#fff" font-size="12" font-weight="bold">Hart 0 - EXECUTING</text>
  <text x="60" y="222" fill="#d2f4d3" font-size="10">x[0..31]: 64-bit integer registers</text>
  <text x="60" y="236" fill="#d2f4d3" font-size="10">f[0..31]: 32-bit float registers</text>
  <text x="60" y="250" fill="#d2f4d3" font-size="10">PC: 0x00010A4C   SP: [low..high]</text>
  <text x="60" y="264" fill="#3fb950" font-size="10" font-weight="bold">ready() = true  |  stat_phase = 1</text>

  <!-- Hart 1 - Stalled on memory -->
  <rect x="50" y="285" width="260" height="70" rx="8" fill="url(#stalledHart)" stroke="#d29922" stroke-width="1.5"/>
  <circle cx="68" cy="303" r="6" fill="#d29922"/>
  <text x="80" y="308" fill="#fff" font-size="12" font-weight="bold">Hart 1 - STALLED (memory)</text>
  <text x="60" y="326" fill="#ffd33d" font-size="10">stalledMemory = true</text>
  <text x="60" y="340" fill="#ffd33d" font-size="10">Waiting for DRAM load response...</text>

  <!-- Hart 2 - Stalled on memory -->
  <rect x="50" y="365" width="260" height="70" rx="8" fill="url(#stalledHart)" stroke="#d29922" stroke-width="1.5"/>
  <circle cx="68" cy="383" r="6" fill="#d29922"/>
  <text x="80" y="388" fill="#fff" font-size="12" font-weight="bold">Hart 2 - STALLED (memory)</text>
  <text x="60" y="406" fill="#ffd33d" font-size="10">stalledMemory = true</text>
  <text x="60" y="420" fill="#ffd33d" font-size="10">Waiting for L2SP atomic response...</text>

  <!-- Hart 3 - Sleeping -->
  <rect x="50" y="445" width="260" height="60" rx="8" fill="url(#sleepHart)" stroke="#8b5cf6" stroke-width="1.5"/>
  <circle cx="68" cy="463" r="6" fill="#8b5cf6"/>
  <text x="80" y="468" fill="#fff" font-size="12" font-weight="bold">Hart 3 - SLEEPING</text>
  <text x="60" y="486" fill="#d2a8ff" font-size="10">stalledSleep = true  (hartsleep CSR)</text>

  <!-- Harts 4..14 -->
  <rect x="50" y="515" width="260" height="40" rx="8" fill="#21262d" stroke="#484f58" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="180" y="540" text-anchor="middle" fill="#8b949e" font-size="12">Harts 4 .. 14 (various states)</text>

  <!-- Hart 15 - Ready -->
  <rect x="50" y="565" width="260" height="55" rx="8" fill="url(#hartGrad)" stroke="#3fb950" stroke-width="1" stroke-dasharray="3,2"/>
  <circle cx="68" cy="583" r="6" fill="#3fb950" opacity="0.5"/>
  <text x="80" y="588" fill="#e6edf3" font-size="12" font-weight="bold">Hart 15 - READY</text>
  <text x="60" y="606" fill="#8b949e" font-size="10">ready() = true (next in round-robin)</text>

  <!-- ========== EXECUTION ENGINE (center) ========== -->
  <rect x="340" y="140" width="400" height="510" rx="10" fill="#1c2128" stroke="#30363d" stroke-width="1.5"/>
  <text x="540" y="165" text-anchor="middle" fill="#e6edf3" font-size="15" font-weight="bold">Execution Engine (1 instr/cycle)</text>

  <!-- Fetch -->
  <rect x="370" y="185" width="340" height="55" rx="8" fill="#21262d" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="540" y="206" text-anchor="middle" fill="#58a6ff" font-size="13" font-weight="bold">FETCH</text>
  <text x="540" y="226" text-anchor="middle" fill="#8b949e" font-size="10">icache_->read(hart.pc()) -- set-associative, LRU</text>

  <!-- Arrow fetch to decode -->
  <line x1="540" y1="240" x2="540" y2="260" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arrowB)"/>
  <text x="610" y="255" fill="#484f58" font-size="9">0 cycles</text>

  <!-- Decode -->
  <rect x="370" y="262" width="340" height="55" rx="8" fill="#21262d" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="540" y="283" text-anchor="middle" fill="#58a6ff" font-size="13" font-weight="bold">DECODE</text>
  <text x="540" y="303" text-anchor="middle" fill="#8b949e" font-size="10">decoder_.decode(inst) -- pattern match on opcode</text>

  <!-- Arrow decode to execute -->
  <line x1="540" y1="317" x2="540" y2="337" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arrowB)"/>
  <text x="610" y="332" fill="#484f58" font-size="9">0 cycles</text>

  <!-- Execute -->
  <rect x="370" y="339" width="340" height="115" rx="8" fill="#21262d" stroke="#3fb950" stroke-width="1.5"/>
  <text x="540" y="360" text-anchor="middle" fill="#3fb950" font-size="13" font-weight="bold">EXECUTE (Visitor Pattern)</text>
  <text x="540" y="380" text-anchor="middle" fill="#8b949e" font-size="10">sim_->visit(hart, instr)</text>

  <!-- Instruction types -->
  <rect x="385" y="390" width="90" height="24" rx="4" fill="#0d1117" stroke="#3fb950" stroke-width="0.8"/>
  <text x="430" y="406" text-anchor="middle" fill="#3fb950" font-size="9">ALU: 1 cyc</text>
  <rect x="485" y="390" width="90" height="24" rx="4" fill="#0d1117" stroke="#3fb950" stroke-width="0.8"/>
  <text x="530" y="406" text-anchor="middle" fill="#3fb950" font-size="9">Branch: 1 cyc</text>
  <rect x="585" y="390" width="110" height="24" rx="4" fill="#0d1117" stroke="#3fb950" stroke-width="0.8"/>
  <text x="640" y="406" text-anchor="middle" fill="#3fb950" font-size="9">MUL/DIV: 1 cyc</text>
  <rect x="385" y="420" width="90" height="24" rx="4" fill="#0d1117" stroke="#d29922" stroke-width="0.8"/>
  <text x="430" y="436" text-anchor="middle" fill="#d29922" font-size="9">Load: STALL</text>
  <rect x="485" y="420" width="90" height="24" rx="4" fill="#0d1117" stroke="#d29922" stroke-width="0.8"/>
  <text x="530" y="436" text-anchor="middle" fill="#d29922" font-size="9">Store: STALL</text>
  <rect x="585" y="420" width="110" height="24" rx="4" fill="#0d1117" stroke="#d29922" stroke-width="0.8"/>
  <text x="640" y="436" text-anchor="middle" fill="#d29922" font-size="9">Atomic: STALL*</text>

  <!-- Memory request path -->
  <line x1="540" y1="454" x2="540" y2="475" stroke="#f0883e" stroke-width="1.5" marker-end="url(#arrowR)"/>

  <!-- Memory Interface -->
  <rect x="370" y="478" width="340" height="50" rx="8" fill="#21262d" stroke="#f0883e" stroke-width="1.5"/>
  <text x="540" y="500" text-anchor="middle" fill="#f0883e" font-size="13" font-weight="bold">Memory Interface (StandardMem)</text>
  <text x="540" y="516" text-anchor="middle" fill="#8b949e" font-size="10">issueMemoryRequest() -> SST MemHierarchy</text>

  <!-- Cycle counter -->
  <rect x="370" y="545" width="340" height="45" rx="8" fill="#0d1117" stroke="#484f58" stroke-width="1"/>
  <text x="540" y="564" text-anchor="middle" fill="#8b949e" font-size="11" font-weight="bold">Cycle Classification</text>
  <text x="540" y="580" text-anchor="middle" fill="#8b949e" font-size="9">busy_cycle | memory_wait_cycle | active_idle_cycle | stall_cycle</text>

  <!-- Connection: Hart pool to engine -->
  <line x1="310" y1="230" x2="370" y2="210" stroke="#3fb950" stroke-width="2" marker-end="url(#arrowG)"/>
  <text x="330" y="210" fill="#3fb950" font-size="9" font-weight="bold">selected</text>
  <text x="330" y="222" fill="#3fb950" font-size="9" font-weight="bold">hart</text>

  <!-- ========== KEY PROPERTIES (right side) ========== -->
  <rect x="770" y="140" width="280" height="510" rx="10" fill="#1c2128" stroke="#30363d" stroke-width="1.5"/>
  <text x="910" y="168" text-anchor="middle" fill="#e6edf3" font-size="14" font-weight="bold">Core Properties</text>

  <!-- No branch prediction -->
  <rect x="790" y="185" width="240" height="65" rx="6" fill="#0d1117" stroke="#f85149" stroke-width="1"/>
  <text x="800" y="205" fill="#f85149" font-size="12" font-weight="bold">No Branch Prediction</text>
  <text x="800" y="222" fill="#8b949e" font-size="10">Branches resolve instantly</text>
  <text x="800" y="236" fill="#8b949e" font-size="10">Zero misprediction penalty</text>

  <!-- No pipeline -->
  <rect x="790" y="260" width="240" height="65" rx="6" fill="#0d1117" stroke="#f85149" stroke-width="1"/>
  <text x="800" y="280" fill="#f85149" font-size="12" font-weight="bold">No Pipeline</text>
  <text x="800" y="297" fill="#8b949e" font-size="10">Single-stage F/D/E combined</text>
  <text x="800" y="311" fill="#8b949e" font-size="10">1 instr per cycle max (IPC &lt;= 1)</text>

  <!-- In-order -->
  <rect x="790" y="335" width="240" height="50" rx="6" fill="#0d1117" stroke="#f85149" stroke-width="1"/>
  <text x="800" y="355" fill="#f85149" font-size="12" font-weight="bold">Strictly In-Order</text>
  <text x="800" y="372" fill="#8b949e" font-size="10">No OOO, no superscalar, no rename</text>

  <!-- Single issue -->
  <rect x="790" y="395" width="240" height="50" rx="6" fill="#0d1117" stroke="#f85149" stroke-width="1"/>
  <text x="800" y="415" fill="#f85149" font-size="12" font-weight="bold">Single-Issue</text>
  <text x="800" y="432" fill="#8b949e" font-size="10">One hart, one instruction per tick</text>

  <!-- ISA -->
  <rect x="790" y="455" width="240" height="50" rx="6" fill="#0d1117" stroke="#58a6ff" stroke-width="1"/>
  <text x="800" y="475" fill="#58a6ff" font-size="12" font-weight="bold">ISA: RV64IMAF</text>
  <text x="800" y="492" fill="#8b949e" font-size="10">Int + Multiply + Atomic + Float</text>

  <!-- Latency hiding -->
  <rect x="790" y="515" width="240" height="65" rx="6" fill="#0d1117" stroke="#3fb950" stroke-width="1.5"/>
  <text x="800" y="535" fill="#3fb950" font-size="12" font-weight="bold">Latency Hiding Strategy</text>
  <text x="800" y="552" fill="#d2f4d3" font-size="10">16 harts hide memory latency</text>
  <text x="800" y="566" fill="#d2f4d3" font-size="10">When 1 stalls, switch to another</text>

  <!-- Posted atomics -->
  <rect x="790" y="590" width="240" height="50" rx="6" fill="#0d1117" stroke="#3fb950" stroke-width="1"/>
  <text x="800" y="610" fill="#3fb950" font-size="12" font-weight="bold">Posted Atomics (rd=x0)</text>
  <text x="800" y="627" fill="#8b949e" font-size="10">Fire-and-forget, no stall</text>

  <!-- ========== BOTTOM: Memory Flow ========== -->
  <rect x="50" y="660" width="1000" height="145" rx="10" fill="#1c2128" stroke="#f0883e" stroke-width="1.5"/>
  <text x="550" y="685" text-anchor="middle" fill="#f0883e" font-size="14" font-weight="bold">Memory System (SST MemHierarchy)</text>

  <!-- Memory regions -->
  <rect x="75" y="700" width="150" height="50" rx="6" fill="#0a8967" stroke="#3fb950" stroke-width="1"/>
  <text x="150" y="720" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">L1SP</text>
  <text x="150" y="738" text-anchor="middle" fill="#d2f4d3" font-size="9">~1ns | 256KB</text>

  <rect x="250" y="700" width="150" height="50" rx="6" fill="#0a8967" stroke="#3fb950" stroke-width="1"/>
  <text x="325" y="720" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">L2SP</text>
  <text x="325" y="738" text-anchor="middle" fill="#d2f4d3" font-size="9">~4ns | 1MB shared</text>

  <rect x="425" y="700" width="180" height="50" rx="6" fill="#e07c24" stroke="#f0883e" stroke-width="1"/>
  <text x="515" y="720" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">DRAM (local)</text>
  <text x="515" y="738" text-anchor="middle" fill="#ffddb0" font-size="9">~70ns+ | 2GB HBM</text>

  <rect x="630" y="700" width="180" height="50" rx="6" fill="#da3633" stroke="#f85149" stroke-width="1"/>
  <text x="720" y="720" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">Remote PXN</text>
  <text x="720" y="738" text-anchor="middle" fill="#ffa198" font-size="9">Network latency | PGAS</text>

  <!-- Response path -->
  <text x="550" y="775" text-anchor="middle" fill="#8b949e" font-size="11">Response arrives -> handleMemEvent() -> unstall hart -> assertCoreOn()</text>

  <!-- Arrow from mem interface to memory system -->
  <line x1="540" y1="528" x2="540" y2="660" stroke="#f0883e" stroke-width="1.5" stroke-dasharray="6,3"/>

  <!-- Response arrow back -->
  <line x1="850" y1="660" x2="850" y2="528" stroke="#3fb950" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrowG)"/>
  <text x="870" y="600" fill="#3fb950" font-size="9">Response</text>
  <text x="870" y="612" fill="#3fb950" font-size="9">callback</text>

  <!-- Outstanding requests note -->
  <rect x="840" y="700" width="195" height="50" rx="6" fill="#0d1117" stroke="#484f58" stroke-width="1"/>
  <text x="937" y="720" text-anchor="middle" fill="#8b949e" font-size="10" font-weight="bold">outstanding_requests_</text>
  <text x="937" y="738" text-anchor="middle" fill="#8b949e" font-size="9">Tracks in-flight requests</text>
</svg>
