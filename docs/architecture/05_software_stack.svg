<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 800" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="appG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#6d28d9"/>
    </linearGradient>
    <linearGradient id="libG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#be185d"/>
    </linearGradient>
    <linearGradient id="simG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1f6feb"/>
      <stop offset="100%" style="stop-color:#1158c7"/>
    </linearGradient>
    <linearGradient id="sstG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a8967"/>
      <stop offset="100%" style="stop-color:#06694e"/>
    </linearGradient>
    <linearGradient id="hwG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e07c24"/>
      <stop offset="100%" style="stop-color:#c56a15"/>
    </linearGradient>
    <filter id="s2">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1000" height="800" fill="#0d1117" rx="12"/>

  <!-- Title -->
  <text x="500" y="38" text-anchor="middle" fill="#e6edf3" font-size="22" font-weight="bold">PANDOHammer Software Stack</text>
  <text x="500" y="58" text-anchor="middle" fill="#8b949e" font-size="12">From driver program to SST simulation</text>

  <!-- ========== Layer 1: Application / Drivers ========== -->
  <rect x="50" y="80" width="600" height="120" rx="10" fill="url(#appG)" stroke="#a78bfa" stroke-width="2" filter="url(#s2)"/>
  <text x="70" y="108" fill="#fff" font-size="16" font-weight="bold">Driver Programs (drvr/)</text>
  <text x="70" y="128" fill="#ddd6fe" font-size="11">RISC-V C/C++ programs cross-compiled with riscv64-unknown-elfpandodrvsim-gcc</text>

  <!-- Driver examples -->
  <rect x="70" y="140" width="85" height="24" rx="4" fill="#0d1117" stroke="#a78bfa" stroke-width="0.8"/>
  <text x="112" y="156" text-anchor="middle" fill="#c4b5fd" font-size="9">bfs_csr_*</text>
  <rect x="165" y="140" width="85" height="24" rx="4" fill="#0d1117" stroke="#a78bfa" stroke-width="0.8"/>
  <text x="207" y="156" text-anchor="middle" fill="#c4b5fd" font-size="9">pagerank_*</text>
  <rect x="260" y="140" width="75" height="24" rx="4" fill="#0d1117" stroke="#a78bfa" stroke-width="0.8"/>
  <text x="297" y="156" text-anchor="middle" fill="#c4b5fd" font-size="9">gemm_*</text>
  <rect x="345" y="140" width="65" height="24" rx="4" fill="#0d1117" stroke="#a78bfa" stroke-width="0.8"/>
  <text x="377" y="156" text-anchor="middle" fill="#c4b5fd" font-size="9">sssp_*</text>
  <rect x="420" y="140" width="65" height="24" rx="4" fill="#0d1117" stroke="#a78bfa" stroke-width="0.8"/>
  <text x="452" y="156" text-anchor="middle" fill="#c4b5fd" font-size="9">gups</text>
  <rect x="495" y="140" width="80" height="24" rx="4" fill="#0d1117" stroke="#a78bfa" stroke-width="0.8"/>
  <text x="535" y="156" text-anchor="middle" fill="#c4b5fd" font-size="9">atomic_bw</text>
  <text x="590" y="157" fill="#484f58" font-size="10">~80 total</text>

  <!-- Section attributes note -->
  <text x="70" y="188" fill="#ddd6fe" font-size="10">Data placement: __l1sp__ (stack), __l2sp__ (shared), __dram__ (main memory) via linker sections</text>

  <!-- ========== Layer 2: PANDOHammer Library ========== -->
  <rect x="50" y="215" width="600" height="120" rx="10" fill="url(#libG)" stroke="#f97583" stroke-width="2" filter="url(#s2)"/>
  <text x="70" y="243" fill="#fff" font-size="16" font-weight="bold">PANDOHammer Runtime Library (pandohammer/)</text>
  <text x="70" y="263" fill="#fecdd3" font-size="11">Bare-metal headers for RISC-V -- MMIO, CSRs, atomics, address translation</text>

  <!-- Headers -->
  <rect x="70" y="275" width="75" height="24" rx="4" fill="#0d1117" stroke="#f97583" stroke-width="0.8"/>
  <text x="107" y="291" text-anchor="middle" fill="#ffa198" font-size="9">mmio.h</text>
  <rect x="155" y="275" width="80" height="24" rx="4" fill="#0d1117" stroke="#f97583" stroke-width="0.8"/>
  <text x="195" y="291" text-anchor="middle" fill="#ffa198" font-size="9">cpuinfo.h</text>
  <rect x="245" y="275" width="80" height="24" rx="4" fill="#0d1117" stroke="#f97583" stroke-width="0.8"/>
  <text x="285" y="291" text-anchor="middle" fill="#ffa198" font-size="9">atomic.h</text>
  <rect x="335" y="275" width="90" height="24" rx="4" fill="#0d1117" stroke="#f97583" stroke-width="0.8"/>
  <text x="380" y="291" text-anchor="middle" fill="#ffa198" font-size="9">hartsleep.h</text>
  <rect x="435" y="275" width="85" height="24" rx="4" fill="#0d1117" stroke="#f97583" stroke-width="0.8"/>
  <text x="477" y="291" text-anchor="middle" fill="#ffa198" font-size="9">address.h</text>
  <rect x="530" y="275" width="95" height="24" rx="4" fill="#0d1117" stroke="#f97583" stroke-width="0.8"/>
  <text x="577" y="291" text-anchor="middle" fill="#ffa198" font-size="9">staticdecl.h</text>

  <text x="70" y="325" fill="#fecdd3" font-size="10">Also: crt.S (startup), lock.c (spinlocks), bsg_link.ld (linker script with L1SP/L2SP/DRAM sections)</text>

  <!-- ========== Interface: MMIO + CSR ========== -->
  <rect x="50" y="350" width="600" height="50" rx="8" fill="#161b22" stroke="#484f58" stroke-width="1.5"/>
  <text x="350" y="370" text-anchor="middle" fill="#e6edf3" font-size="12" font-weight="bold">Hardware Interface:  MMIO (0xFFFF...0000+)  |  CSRs (mhartid, mcoreid, sleep, ...)  |  AMO instructions</text>
  <text x="350" y="390" text-anchor="middle" fill="#8b949e" font-size="10">Drivers communicate with simulator via stores to MMIO addresses and CSR read/write instructions</text>

  <!-- ========== Layer 3: SST Element (Simulator) ========== -->
  <rect x="50" y="415" width="600" height="140" rx="10" fill="url(#simG)" stroke="#58a6ff" stroke-width="2" filter="url(#s2)"/>
  <text x="70" y="443" fill="#fff" font-size="16" font-weight="bold">SST Element: Drv (element/)</text>
  <text x="70" y="463" fill="#bbd5fc" font-size="11">C++ SST components -- RISC-V interpreter + memory system integration</text>

  <!-- Components -->
  <rect x="70" y="478" width="120" height="28" rx="4" fill="#0d1117" stroke="#58a6ff" stroke-width="0.8"/>
  <text x="130" y="496" text-anchor="middle" fill="#79c0ff" font-size="9">SSTRISCVCore</text>
  <rect x="200" y="478" width="130" height="28" rx="4" fill="#0d1117" stroke="#58a6ff" stroke-width="0.8"/>
  <text x="265" y="496" text-anchor="middle" fill="#79c0ff" font-size="9">SSTRISCVSimulator</text>
  <rect x="340" y="478" width="100" height="28" rx="4" fill="#0d1117" stroke="#58a6ff" stroke-width="0.8"/>
  <text x="390" y="496" text-anchor="middle" fill="#79c0ff" font-size="9">DrvStdMemory</text>
  <rect x="450" y="478" width="115" height="28" rx="4" fill="#0d1117" stroke="#58a6ff" stroke-width="0.8"/>
  <text x="507" y="496" text-anchor="middle" fill="#79c0ff" font-size="9">DrvCustomStdMem</text>

  <rect x="70" y="514" width="100" height="28" rx="4" fill="#0d1117" stroke="#58a6ff" stroke-width="0.8"/>
  <text x="120" y="532" text-anchor="middle" fill="#79c0ff" font-size="9">SSTRISCVHart</text>
  <rect x="180" y="514" width="100" height="28" rx="4" fill="#0d1117" stroke="#58a6ff" stroke-width="0.8"/>
  <text x="230" y="532" text-anchor="middle" fill="#79c0ff" font-size="9">PGASTranslator</text>
  <rect x="290" y="514" width="100" height="28" rx="4" fill="#0d1117" stroke="#58a6ff" stroke-width="0.8"/>
  <text x="340" y="532" text-anchor="middle" fill="#79c0ff" font-size="9">AddressDecoder</text>
  <rect x="400" y="514" width="75" height="28" rx="4" fill="#0d1117" stroke="#58a6ff" stroke-width="0.8"/>
  <text x="437" y="532" text-anchor="middle" fill="#79c0ff" font-size="9">ICache</text>
  <rect x="485" y="514" width="85" height="28" rx="4" fill="#0d1117" stroke="#58a6ff" stroke-width="0.8"/>
  <text x="527" y="532" text-anchor="middle" fill="#79c0ff" font-size="9">DrvSysConfig</text>

  <!-- ========== Layer 4: Python Model ========== -->
  <rect x="50" y="570" width="600" height="100" rx="10" fill="url(#sstG)" stroke="#3fb950" stroke-width="2" filter="url(#s2)"/>
  <text x="70" y="598" fill="#fff" font-size="16" font-weight="bold">Python SST Model (model/)</text>
  <text x="70" y="618" fill="#d2f4d3" font-size="11">Assembles SST component hierarchy -- builder pattern</text>

  <rect x="70" y="630" width="82" height="24" rx="4" fill="#0d1117" stroke="#3fb950" stroke-width="0.8"/>
  <text x="111" y="646" text-anchor="middle" fill="#7ee787" font-size="9">drvr.py</text>
  <rect x="162" y="630" width="108" height="24" rx="4" fill="#0d1117" stroke="#3fb950" stroke-width="0.8"/>
  <text x="216" y="646" text-anchor="middle" fill="#7ee787" font-size="9">pandohammer.py</text>
  <rect x="280" y="630" width="90" height="24" rx="4" fill="#0d1117" stroke="#3fb950" stroke-width="0.8"/>
  <text x="325" y="646" text-anchor="middle" fill="#7ee787" font-size="9">compute.py</text>
  <rect x="380" y="630" width="85" height="24" rx="4" fill="#0d1117" stroke="#3fb950" stroke-width="0.8"/>
  <text x="422" y="646" text-anchor="middle" fill="#7ee787" font-size="9">memory.py</text>
  <rect x="475" y="630" width="65" height="24" rx="4" fill="#0d1117" stroke="#3fb950" stroke-width="0.8"/>
  <text x="507" y="646" text-anchor="middle" fill="#7ee787" font-size="9">pxn.py</text>
  <rect x="550" y="630" width="70" height="24" rx="4" fill="#0d1117" stroke="#3fb950" stroke-width="0.8"/>
  <text x="585" y="646" text-anchor="middle" fill="#7ee787" font-size="9">pod.py</text>

  <!-- ========== Layer 5: SST Core ========== -->
  <rect x="50" y="685" width="600" height="50" rx="10" fill="#21262d" stroke="#484f58" stroke-width="2" filter="url(#s2)"/>
  <text x="350" y="710" text-anchor="middle" fill="#8b949e" font-size="14" font-weight="bold">SST Core + SST Elements (MemHierarchy, Merlin)</text>
  <text x="350" y="726" text-anchor="middle" fill="#484f58" font-size="10">Discrete event simulation engine | Memory controllers | Network routers</text>

  <!-- ========== Right side: Build + Run flow ========== -->
  <rect x="690" y="80" width="280" height="655" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="830" y="108" text-anchor="middle" fill="#e6edf3" font-size="14" font-weight="bold">Build &amp; Run Flow</text>

  <!-- Step 1 -->
  <circle cx="720" cy="140" r="14" fill="#8b5cf6" stroke="#a78bfa" stroke-width="1"/>
  <text x="720" y="145" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">1</text>
  <text x="745" y="137" fill="#c4b5fd" font-size="11" font-weight="bold">Cross-Compile</text>
  <text x="745" y="155" fill="#8b949e" font-size="9">riscv64-gcc -> drvr_bfs_*</text>
  <text x="745" y="170" fill="#8b949e" font-size="9">-march=rv64imaf -O3</text>

  <!-- Step 2 -->
  <circle cx="720" cy="205" r="14" fill="#e94560" stroke="#f97583" stroke-width="1"/>
  <text x="720" y="210" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">2</text>
  <text x="745" y="202" fill="#ffa198" font-size="11" font-weight="bold">Generate address_map.h</text>
  <text x="745" y="220" fill="#8b949e" font-size="9">py/addressmap.py --pod-cores-x 8</text>
  <text x="745" y="235" fill="#8b949e" font-size="9">--core-threads 16 cheader</text>

  <!-- Step 3 -->
  <circle cx="720" cy="270" r="14" fill="#1f6feb" stroke="#58a6ff" stroke-width="1"/>
  <text x="720" y="275" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">3</text>
  <text x="745" y="267" fill="#79c0ff" font-size="11" font-weight="bold">Build SST Element</text>
  <text x="745" y="285" fill="#8b949e" font-size="9">make Drv -> libDrv.so</text>
  <text x="745" y="300" fill="#8b949e" font-size="9">SST::SSTRegister Drv</text>

  <!-- Step 4 -->
  <circle cx="720" cy="345" r="14" fill="#0a8967" stroke="#3fb950" stroke-width="1"/>
  <text x="720" y="350" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">4</text>
  <text x="745" y="342" fill="#7ee787" font-size="11" font-weight="bold">Run Simulation</text>
  <text x="745" y="360" fill="#8b949e" font-size="9">sst -n 1 model/drvr.py --</text>
  <text x="745" y="375" fill="#8b949e" font-size="9">  --num-pxn 1</text>
  <text x="745" y="390" fill="#8b949e" font-size="9">  --pod-cores-x 8</text>
  <text x="745" y="405" fill="#8b949e" font-size="9">  --core-threads 16</text>
  <text x="745" y="420" fill="#8b949e" font-size="9">  ./drvr_bfs --V 65536</text>

  <!-- Step 5 -->
  <circle cx="720" cy="465" r="14" fill="#e07c24" stroke="#f0883e" stroke-width="1"/>
  <text x="720" y="470" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">5</text>
  <text x="745" y="462" fill="#f0883e" font-size="11" font-weight="bold">Simulation Runs</text>
  <text x="745" y="480" fill="#8b949e" font-size="9">Python model builds SST graph</text>
  <text x="745" y="495" fill="#8b949e" font-size="9">SST creates components</text>
  <text x="745" y="510" fill="#8b949e" font-size="9">Cores load ELF, execute</text>
  <text x="745" y="525" fill="#8b949e" font-size="9">Memory ops -> MemHierarchy</text>

  <!-- Step 6 -->
  <circle cx="720" cy="565" r="14" fill="#da3633" stroke="#f85149" stroke-width="1"/>
  <text x="720" y="570" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">6</text>
  <text x="745" y="562" fill="#ffa198" font-size="11" font-weight="bold">Collect Stats</text>
  <text x="745" y="580" fill="#8b949e" font-size="9">stats.csv (SST output)</text>
  <text x="745" y="595" fill="#8b949e" font-size="9">ramulator_*.stats</text>
  <text x="745" y="610" fill="#8b949e" font-size="9">l2sp_timestamps_*.csv</text>

  <!-- Step 7 -->
  <circle cx="720" cy="650" r="14" fill="#6e40aa" stroke="#8b5cf6" stroke-width="1"/>
  <text x="720" y="655" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">7</text>
  <text x="745" y="647" fill="#d2a8ff" font-size="11" font-weight="bold">Analyze</text>
  <text x="745" y="665" fill="#8b949e" font-size="9">python summarize.py --edges N</text>
  <text x="745" y="680" fill="#8b949e" font-size="9">-> cycle breakdown, BW, TEPS</text>
  <text x="745" y="695" fill="#8b949e" font-size="9">python summarize_ramulator.py</text>
  <text x="745" y="710" fill="#8b949e" font-size="9">-> per-channel DRAM analysis</text>

  <!-- Arrows between steps -->
  <line x1="720" y1="154" x2="720" y2="191" stroke="#484f58" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="720" y1="219" x2="720" y2="256" stroke="#484f58" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="720" y1="284" x2="720" y2="331" stroke="#484f58" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="720" y1="359" x2="720" y2="451" stroke="#484f58" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="720" y1="479" x2="720" y2="551" stroke="#484f58" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="720" y1="579" x2="720" y2="636" stroke="#484f58" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Footer -->
  <text x="500" y="775" text-anchor="middle" fill="#484f58" font-size="10">PANDOHammer -- Throughput-oriented many-core RISC-V simulator on SST</text>
</svg>
