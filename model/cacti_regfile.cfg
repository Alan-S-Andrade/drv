# Register file per core: 16 harts × (32 int + 32 FP) × 8 bytes = 8 KB
# Modeled as multi-ported SRAM (RAM type)
# Barrel-threaded: only one hart active per cycle, so 2 read + 1 write sufficient
-size (bytes) 8192

# power gating
-Array Power Gating - "false"
-WL Power Gating - "false"
-CL Power Gating - "false"
-Bitline floating - "false"
-Interconnect Power Gating - "false"
-Power Gating Performance Loss 0.01

# 8 bytes per register entry (64-bit)
-block size (bytes) 8

# Direct-mapped (register file indexed by hart+reg number)
-associativity 1

# Ports: barrel-threaded core, 2 source operand reads + 1 destination write per cycle
-read-write port 0
-exclusive read port 2
-exclusive write port 1
-single ended read ports 0

-UCA bank count 1
-technology (u) 0.022

-page size (bits) 8192
-burst length 8
-internal prefetch width 8

-Data array cell type - "itrs-hp"
-Data array peripheral type - "itrs-hp"
-Tag array cell type - "itrs-hp"
-Tag array peripheral type - "itrs-hp"

# 64-bit data bus
-output/input bus width 64

-operating temperature (K) 360

# Register file is a RAM (scratchpad-like)
-cache type "ram"

-tag size (b) "default"
-access mode (normal, sequential, fast) - "normal"

-design objective (weight delay, dynamic power, leakage power, cycle time, area) 100:0:0:0:0
-deviate (delay, dynamic power, leakage power, cycle time, area) 1000000:1000000:1000000:1000000:1000000

-NUCAdesign objective (weight delay, dynamic power, leakage power, cycle time, area) 100:100:0:0:100
-NUCAdeviate (delay, dynamic power, leakage power, cycle time, area) 10:10000:10000:10000:10000

-Optimize ED or ED^2 (ED, ED^2, NONE): "NONE"

-Cache model (NUCA, UCA)  - "UCA"
-NUCA bank count 0

-Wire signaling (fullswing, lowswing, default) - "Global_30"
-Wire inside mat - "semi-global"
-Wire outside mat - "semi-global"

-Interconnect projection - "conservative"

-Core count 16
-Cache level (L2/L3) - "L3"

-Add ECC - "false"

-Print level (DETAILED, CONCISE) - "DETAILED"
-Print input parameters - "true"
-Force cache config - "false"
-Ndwl 1
-Ndbl 1
-Nspd 0
-Ndcm 1
-Ndsam1 0
-Ndsam2 0

-dram_type "DDR3"
-io state "WRITE"
-addr_int_line_type "ca"
-freq_MHz 800
-duty_cycle 0.5
-activity_dq 1.0
-activity_ca 0.5
-num_dq 72
-num_dqs 18
-num_ca 25
-num_clk 2
-num_mem_dq 2
-mem_data_width 8
-num_bobs 1
-capacity 80
-num_channels_per_bob 1
-first metric "Cost"
-second metric "Bandwidth"
-third metric "Energy"
-dimm_model "ALL"
-mirror_in_bob "T"
-num_die_bob 1
-clk_margin 0.5
